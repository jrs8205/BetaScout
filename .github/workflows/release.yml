name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          BETASCOUT_KEYSTORE: ${{ runner.temp }}/release.keystore
          BETASCOUT_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BETASCOUT_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          BETASCOUT_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk "BetaScout-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "BetaScout-${GITHUB_REF_NAME}.apk" \
            --title "BetaScout $GITHUB_REF_NAME" \
            --generate-notes
